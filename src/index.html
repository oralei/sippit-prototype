<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>sippit</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="background"></div>
    <div class="background2" id="background2"></div>
    <div class="titlebar">
      <div class="item-1"></div>
      <div class="bar-button item-2"><button id="minimizeButton"><img src="images/minimizeButton.png" alt="-" draggable="false"></button></div>
      <div class="bar-button item-3"><button id="exitButton"><img src="images/closeButton.png" alt="x" draggable="false"></button></div>
    </div>

    <div class="main-view">
      <div class="cell fold-btn">
        <input type="checkbox" id="info-btn" hidden>
        <label for="info-btn" class="checkbox-image"></label>
      </div>
      <img src="images/timerIcon.png" id="timer-icon" draggable="false">
      <div id="timer" class="cell">00:00</div>
      <div class="cell cell-1">
        <div class="bottle-container" id="bottle-container">
          <img src="images/bottleWater.png" id="water-fill" draggable="false">
          <img src="images/bottleEmpty.png" class="bottle-overlay" draggable="false">
          <div id="remaining-ml">EMPTY ml</div>
          <div id="remaining-oz">EMPTY oz</div>
        </div>
      </div>
      <div class="cell cell-2"><button id="sip-btn"><img src="images/sipButton.png" alt="sip" draggable="false"></button></div>
    </div>
    <img src="images/darkscreen.png" id="darkscreen1" draggable="false">

    <div id="fill-menu">
      <a id="fill-header">Set Current Amount</a>
      <div class="slidecontainer">
        <input type="range" step="0.5" min="0" max="100" value="50" class="slider" id="fill-slider">
      </div>
      <span id="fill-percent">50.0 %</span>
      <div class="box3"><button id="no-btn2"><img src="images/noButton.png" alt="no" draggable="false"></button></div>
      <div class="box3"><button id="yes-btn2"><img src="images/yesButton.png" alt="yes" draggable="false"></button></div>
    </div>

    <div id="sip-menu">
      <div class="box sip-amount-field">
        <form class="sip-form">
          <img src = "images/sipTextField.png" class="sip-field-img" draggable="false">
          <input type="text" class="sip-amount-input" id="sip-amount-input">
        </form>
      </div>
      <div class="box2"><button id="no-btn"><img src="images/noButton.png" alt="no" draggable="false"></button></div>
      <div class="box2"><button id="yes-btn"><img src="images/yesButton.png" alt="yes" draggable="false"></button></div>
    </div>

    <div class="info-view">

      <h1 id="welcome-name">Welcome, Name!</h1>

      <!-- Daily Progress Bar -->
      <div class="w3-border">
        <div class="w3-grey" style="height:24px;width:100%"></div>
      </div>

      <!-- Stat boxes -->
      <div class="stat-boxes">
        <div class="stat-block">
          <h1 id="total-today">800 ml</h1>
          <h2>today</h2>
        </div>
        <div class="stat-block">
          <h1 id="average-sip">11 ml</h1>
          <h2>avg sip</h2>
        </div>
        <div class="stat-block">
          <h1 id="grand-total">4200 ml</h1>
          <h2>total</h2>
        </div>
        <div class="stat-block">
          <h1 id="hours-total">26 hrs</h1>
          <h2>active</h2>
        </div>
      </div>

      <div class="capacity-block">
        <h1 id="bottle-size">Bottle Capacity</h1>
        <input type="text" id="capacity-input" name="capacity-input" disabled>
        <h1 id="bottle-size-unit">ml</h1>
        <button class="small-button" id="capacity-change"><img src="images/smallEdit.png" draggable="false"></button>
        <button class="small-button" id="capacity-change-yes"><img src="images/smallCheckNew.png" draggable="false"></button>
        <button class="small-button" id="capacity-change-no"><img src="images/smallNo.png" draggable="false"></button>
      </div>
      
      <div class="goal-block">
        <h1 id="daily-goal">Daily Goal: 0% </h1>
        <input type="text" id="goal-input" name="goal-input" value="2000" disabled>
        <h1 id="daily-goal-unit">ml</h1>
        <button id="goal-start"><img src="images/smallEdit.png" alt="-" draggable="false"></button>
      </div>

      <div class="reminder-block">
        <h1 id="reminder-header">Reminder</h1>
        <input type="text" id="time-input" name="time-input" disabled>
        <h1 id="reminder-unit">seconds</h1>
        <button id="time-start"><img src="images/smallEdit.png" alt="-" draggable="false"></button>
      </div>

    </div>

    

    <div class="unit-selector" id="unitSelector">
      <!-- Dynamically filled by JS -->
    </div>

  </body>
  <script src="js/units.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/hydration.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/main.js"></script>
  <script defer src="js/eventHandlers.js"></script>
  <script defer src="js/eventRegister.js"></script> <!-- needs everything, goes last -->
</html>
